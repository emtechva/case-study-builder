<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Case Study Builder v2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1f1f2e;
    --border2: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.18);
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --text-dim: #4a4a6a;
    --green: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --red: #f87171;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
  }

  header {
    position: relative;
    z-index:10;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(9,9,15,0.95);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .logo span { color: var(--accent2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    border-radius: 20px;
    color: var(--accent2);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .save-status {
    font-size: 11px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .save-status.show { opacity: 1; }

  .save-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.3; }
  }

  .app {
    flex: 1;
    display: flex;
    position: relative;
    z-index:2;
    overflow: hidden;
    height: calc(100vh - 63px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 290px;
    min-width: 290px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .sidebar-section {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .starter-btn {
    width: 100%;
    padding: 11px 13px;
    margin-bottom: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    line-height: 1.45;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .starter-btn::before {
    content:'';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .starter-btn.s1::before { background: var(--accent); }
  .starter-btn.s2::before { background: var(--green); }
  .starter-btn.s3::before { background: var(--orange); }
  .starter-btn.s4::before { background: var(--pink); }

  .starter-btn:hover { border-color: var(--border2); background: #1c1c2a; transform: translateX(2px); }
  .starter-btn:hover::before { opacity: 1; }

  .starter-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .s1 .starter-label { color: var(--accent2); }
  .s2 .starter-label { color: var(--green); }
  .s3 .starter-label { color: var(--orange); }
  .s4 .starter-label { color: var(--pink); }

  /* SESSION HISTORY */
  .session-list {
    padding: 14px 18px;
    flex: 1;
  }

  .session-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 11px;
    margin-bottom: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
    gap: 8px;
  }

  .session-item:hover { border-color: var(--border2); background: #1c1c2a; }
  .session-item.active { border-color: var(--accent); background: var(--accent-glow); }

  .session-info { flex: 1; min-width: 0; }

  .session-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-date {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .session-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .session-del:hover { color: var(--red); background: rgba(248,113,113,0.1); }

  .no-sessions {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 16px 0;
    font-style: italic;
  }

  /* BOTTOM SIDEBAR ACTIONS */
  .sidebar-actions {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .action-btn {
    width: 100%;
    padding: 9px 12px;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 500;
  }

  .btn-new {
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    color: #fff;
  }

  .btn-new:hover { opacity: 0.88; transform: translateY(-1px); }

  .btn-export {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-muted);
  }

  .btn-export:hover { border-color: var(--green); color: var(--green); }

  .btn-clear-all {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11.5px;
  }

  .btn-clear-all:hover { border-color: var(--red); color: var(--red); }

  /* CHAT */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  .welcome {
    text-align: center;
    padding: 44px 20px;
    max-width: 540px;
    margin: 0 auto;
  }

  .welcome-icon {
    width: 58px; height: 58px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin: 0 auto 18px;
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 21px;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome p { color: var(--text-muted); font-size: 13.5px; line-height: 1.7; margin-bottom: 20px; }

  .hint-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }

  .hint-chip {
    font-size: 11px;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    background: var(--surface2);
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; margin-left: auto; max-width: 75%; }
  .msg.ai { max-width: 88%; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.ai .avatar { background: linear-gradient(135deg, var(--accent), #4f46e5); }
  .msg.user .avatar { background: var(--surface2); border: 1px solid var(--border2); }

  .bubble {
    padding: 13px 17px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.75;
  }

  .msg.ai .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border-top-right-radius: 4px;
    color: #fff;
  }

  .bubble h3 { font-family: 'Syne', sans-serif; font-size: 14.5px; font-weight: 700; margin: 12px 0 5px; color: var(--accent2); }
  .bubble h4 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin: 10px 0 4px; color: var(--text); }
  .bubble p { margin-bottom: 6px; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }
  .bubble strong { color: var(--accent2); font-weight: 600; }

  .bubble-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 13px;
    font-size: 11.5px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .typing-indicator { display: flex; gap: 12px; align-items: flex-start; }

  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 13px 17px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-6px); opacity:1; }
  }

  .input-area {
    padding: 14px 28px 18px;
    border-top: 1px solid var(--border);
    background: rgba(9,9,15,0.9);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 13px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--text-dim); }

  #sendBtn {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    border-radius: 9px;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-glow); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 7px; text-align: center; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 11px 18px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.green { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    Portfolio <span>Case Study Builder</span>
  </div>
  <div class="header-right">
    <div class="save-status" id="saveStatus">
      <div class="save-dot"></div> Saved
    </div>
    <div class="badge">v2 · Auto-Save On</div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Quick Starters</div>

      <button class="starter-btn s1" onclick="sendStarter(1)">
        <div class="starter-label">✦ Create</div>
        Create a professional case study. Ask me for details first.
      </button>

      <button class="starter-btn s2" onclick="sendStarter(2)">
        <div class="starter-label">✦ Mockup</div>
        Create a mockup portfolio case study with expected outcomes.
      </button>

      <button class="starter-btn s3" onclick="sendStarter(3)">
        <div class="starter-label">✦ Upgrade</div>
        Turn my simple project into a premium case study.
      </button>

      <button class="starter-btn s4" onclick="sendStarter(4)">
        <div class="starter-label">✦ Visual</div>
        Turn my case study into an HTML portfolio preview.
      </button>
    </div>

    <div class="session-list">
      <div class="sidebar-label" style="margin-bottom:10px;">Saved Sessions</div>
      <div id="sessionList">
        <div class="no-sessions">No saved sessions yet.<br>Start a chat to auto-save.</div>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="action-btn btn-new" onclick="newSession()">✦ New Session</button>
      <button class="action-btn btn-export" onclick="exportSession()">↓ Export This Chat (.md)</button>
      <button class="action-btn btn-clear-all" onclick="clearAllSessions()">🗑 Clear All Sessions</button>
    </div>

  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Describe your project, paste details, or type a question..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <p class="input-hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SYSTEM_PROMPT = `You are a Portfolio Case Study Builder AI for Virtual Assistants, Tech VAs, AI Automation VAs, Funnel Builders, CRM/GoHighLevel Assistants, and online freelancers.

Your job: Help users create professional, credible, client-attracting case studies for portfolios, LinkedIn, Upwork, OnlineJobs.ph, Notion, websites, or PDF portfolios.

CORE RULES:
- Do NOT create a full case study immediately if details are missing. Ask for input first using a clean fill-in-the-blank format.
- If only a project idea is given, ask just 2 questions: (1) What role do you want this to position you for? (2) Is this real or a mockup/practice project?
- If user says "assume," "make a mockup," "create a sample," or "I don't have details yet" — create a realistic sample but label it clearly as mockup/sample.
- Never invent fake client results, revenue, testimonials, or real company claims unless user provides them. For mockups, use expected outcomes only.

CASE STUDY STRUCTURE (use unless user asks for another format):
1. Project Title
2. Project Type (Real / Mockup / Practice)
3. Role
4. Tools Used
5. Project Overview
6. Business Background
7. The Problem / Challenge
8. Project Goal
9. My Role
10. Strategy / Process
11. Solution Created
12. Workflow / System Breakdown
13. Deliverables
14. Results / Expected Results
15. Before and After
16. Screenshots / Visual Proof to Include
17. Key Skills Demonstrated
18. Lessons Learned
19. Final Summary

For Tech VA / Automation / GHL / Funnel projects, add: Funnel Structure, CRM Pipeline, Tags and Segmentation, Triggers and Conditions, Email/SMS Sequence, Internal Notifications, Follow-Up Workflow, No-Show Recovery, Review Request, Reactivation Workflow.

MOCKUP WORDING (always use for practice/mockup projects):
- "This is a mockup portfolio project created to demonstrate my ability to design and organize a client-ready system."
- "Since this was a practice project, the results are presented as expected outcomes instead of actual client metrics."
NEVER write: "The client achieved..." or "Revenue increased..." unless user gives real data.

PREMIUM UPGRADE RULE:
When user wants to upgrade a project, expand from a simple task into a complete business workflow. Example: a "booking page" becomes: appointment request → confirmation → reminders (1 day, 4 hours, 1 hour) → cancellation → reschedule → no-show recovery → post-visit thank-you → review request → reactivation campaign + full CRM pipeline.

ROLE ADAPTATION:
- Tech VA / AI Automation VA: systems, workflows, CRM, automation, triggers, conditions, integrations, documentation.
- Funnel Builder: landing page, offer flow, lead capture, booking page, thank-you page, nurture sequence.
- CRM / GoHighLevel: pipeline, tags, custom fields, forms, calendars, workflows, segmentation.
- Executive Assistant: inbox, calendar, SOPs, task tracking, meetings, reminders.
- Social Media Manager: content calendar, captions, scheduling, engagement, analytics.
- Customer Support VA: response templates, tickets, FAQs, escalation, follow-up.

STYLE:
- Professional, clear, beginner-friendly, practical, polished.
- Use clean headings, short paragraphs, bullets where useful.
- Avoid hype, buzzwords, fake results, or exaggerated claims.
- Make outputs portfolio-ready and client-focused.
- Tone: friendly but professional, human and natural.`;

// ─── STATE ───────────────────────────────────────────────
let sessions = [];
let activeSessionId = null;
let isLoading = false;

// ─── INIT ─────────────────────────────────────────────────
window.onload = () => {
  loadSessions();
  if (sessions.length === 0) {
    createSession();
  } else {
    loadSession(sessions[0].id);
  }
};

// ─── SESSION MANAGEMENT ──────────────────────────────────
function generateId() {
  return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

function createSession(title = null) {
  const id = generateId();
  const now = new Date();
  const session = {
    id,
    title: title || 'New Session',
    date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
    messages: []
  };
  sessions.unshift(session);
  saveSessions();
  activeSessionId = id;
  renderSessionList();
  renderMessages();
  return id;
}

function loadSessions() {
  try {
    const raw = localStorage.getItem('csb_sessions');
    sessions = raw ? JSON.parse(raw) : [];
  } catch(e) {
    sessions = [];
  }
}

function saveSessions() {
  try {
    localStorage.setItem('csb_sessions', JSON.stringify(sessions));
    showSaveStatus();
  } catch(e) {}
}

function getActiveSession() {
  return sessions.find(s => s.id === activeSessionId);
}

function loadSession(id) {
  activeSessionId = id;
  renderSessionList();
  renderMessages();
}

function newSession() {
  createSession();
  showToast('✦ New session started', 'green');
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (activeSessionId === id) {
    if (sessions.length > 0) {
      loadSession(sessions[0].id);
    } else {
      createSession();
    }
  } else {
    renderSessionList();
  }
  showToast('Session deleted');
}

function clearAllSessions() {
  if (!confirm('Clear all saved sessions? This cannot be undone.')) return;
  sessions = [];
  localStorage.removeItem('csb_sessions');
  createSession();
  showToast('All sessions cleared');
}

// ─── RENDER ───────────────────────────────────────────────
function renderSessionList() {
  const el = document.getElementById('sessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="no-sessions">No saved sessions yet.<br>Start a chat to auto-save.</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === activeSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <div class="session-info">
        <div class="session-title">${escHtml(s.title)}</div>
        <div class="session-date">${s.date}</div>
      </div>
      <button class="session-del" onclick="deleteSession('${s.id}', event)" title="Delete">✕</button>
    </div>
  `).join('');
}

function renderMessages() {
  const container = document.getElementById('messages');
  const session = getActiveSession();

  if (!session || session.messages.length === 0) {
    container.innerHTML = `
      <div class="welcome">
        <div class="welcome-icon">📋</div>
        <h2>Portfolio Case Study Builder</h2>
        <p>Your AI-powered case study strategist for Tech VA, AI Automation VA, Funnel Builder, CRM, and all freelance roles. Click a starter or type your project below.</p>
        <div class="hint-row">
          <span class="hint-chip">Real Projects</span>
          <span class="hint-chip">Mockup / Practice</span>
          <span class="hint-chip">Premium Upgrades</span>
          <span class="hint-chip">Portfolio-Ready Copy</span>
          <span class="hint-chip">HTML Previews</span>
        </div>
      </div>`;
    return;
  }

  container.innerHTML = '';
  session.messages.forEach(m => appendMessageEl(m.role, m.content, false));
  container.scrollTop = container.scrollHeight;
}

// ─── MESSAGING ───────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendStarter(n) {
  const starters = {
    1: "Create a professional case study for my VA / Tech VA / Automation project. Ask me for the project details first using a fill-in-the-blank format before writing the case study.",
    2: "Help me create a mockup portfolio case study. Ask me for the key project details first, then turn it into a complete beginner-friendly but professional case study with expected outcomes only.",
    3: "Turn my simple project into a premium case study. Ask me what I created, what tools I used, what problem it solves, and what workflows, conditions, or premium features can be added.",
    4: "Turn my case study into an interactive dashboard or HTML portfolio preview. Ask for my project details first, then create a visual layout with workflow, deliverables, expected results, and proof checklist."
  };
  document.getElementById('userInput').value = starters[n];
  await sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  const session = getActiveSession();
  if (!session) return;

  // Update session title from first message
  if (session.messages.length === 0) {
    session.title = text.length > 42 ? text.slice(0, 42) + '…' : text;
    session.date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  input.value = '';
  input.style.height = 'auto';

  session.messages.push({ role: 'user', content: text });
  saveSessions();

  // Clear welcome if present
  const container = document.getElementById('messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  appendMessageEl('user', text, true);
  showTyping();

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const apiMessages = session.messages.map(m => ({ role: m.role, content: m.content }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: apiMessages
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.map(b => b.text || '').filter(Boolean).join('\n')
      || 'Something went wrong. Please try again.';

    session.messages.push({ role: 'assistant', content: reply });
    saveSessions();
    renderSessionList();
    appendMessageEl('ai', reply, true);

  } catch(err) {
    removeTyping();
    appendMessageEl('ai', '⚠️ Connection error. Please check your internet and try again.', true);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function appendMessageEl(role, text, scroll) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'ai' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  if (role === 'ai') {
    const actions = document.createElement('div');
    actions.className = 'bubble-actions';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = '📋 Copy';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(text);
      copyBtn.innerHTML = '✅ Copied!';
      setTimeout(() => copyBtn.innerHTML = '📋 Copy', 2000);
    };

    actions.appendChild(copyBtn);
    bubble.appendChild(actions);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);

  if (scroll) container.scrollTop = container.scrollHeight;
}

// ─── EXPORT ──────────────────────────────────────────────
function exportSession() {
  const session = getActiveSession();
  if (!session || session.messages.length === 0) {
    showToast('Nothing to export yet.');
    return;
  }

  let md = `# ${session.title}\n_Exported: ${new Date().toLocaleString()}_\n\n---\n\n`;
  session.messages.forEach(m => {
    md += m.role === 'user'
      ? `**You:**\n${m.content}\n\n`
      : `**Case Study Builder:**\n${m.content}\n\n---\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `case-study-${Date.now()}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Exported as .md file', 'green');
}

// ─── HELPERS ─────────────────────────────────────────────
function formatText(text) {
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^# (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)(?=\s*<li>|$)/g, (m) => `<ul>${m}</ul>`);
  text = text.replace(/\n\n+/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  return `<p>${text}</p>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.style.background = 'linear-gradient(135deg, var(--accent), #4f46e5)';
  avatar.textContent = '🤖';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(avatar);
  div.appendChild(dots);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showSaveStatus() {
  const el = document.getElementById('saveStatus');
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}
</script>
